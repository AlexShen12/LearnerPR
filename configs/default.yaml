# LearnerPR — default configuration

# ─── Paths ───────────────────────────────────────────────────────────
paths:
  msls_root: /users/a/l/alshen/LearnerPR/datasets/msls
  teacher_cache: /users/a/l/alshen/LearnerPR/cache/teacher_embeddings_msls.pt
  gsv_cities_root: /users/a/l/alshen/LearnerPR/datasets/gsv-cities
  teacher_cache_gsv: /users/a/l/alshen/LearnerPR/cache/teacher_embeddings_gsv.pt
  checkpoint_dir: /users/a/l/alshen/LearnerPR/checkpoints
  log_dir: /users/a/l/alshen/LearnerPR/logs

# ─── Teacher ─────────────────────────────────────────────────────────
teacher:
  model_name: Qwen/Qwen3-VL-8B-Instruct
  image_size: 448
  batch_size: 16
  dtype: bfloat16
  prompt: "Describe this place."            # fixed, never changed

# ─── Student ─────────────────────────────────────────────────────────
student:
  backbone: facebook/dinov2-small
  embed_dim: 384
  gem_p_init: 3.0
  freeze_backbone_epochs: 5                 # freeze DINOv2 for first N epochs
  unfreeze_last_n_blocks: 4                 # then unfreeze last K blocks
  backbone_lr_scale: 0.05                   # backbone LR = lr * backbone_lr_scale after unfreeze

# ─── Training ────────────────────────────────────────────────────────
training:
  epochs: 30
  batch_size: 64
  lr: 1.0e-4
  weight_decay: 1.0e-4
  warmup_epochs: 2                          # linear LR warmup; cosine decay for remaining epochs
  alpha_rkd: 1.0                            # weight for RKD loss
  beta_triplet: 0.3                         # weight for triplet loss (active GSV-only; 0 to disable)
  triplet_margin: 0.1
  triplet_p: 16                             # P×K sampler: places per batch
  triplet_k: 4                              # P×K sampler: images per place (batch_size = P*K = 64)
  rkd_temperature: 0.1                      # temperature scaling on teacher sim matrix
  early_stop_patience: 5                    # epochs without val R@5 improvement
  early_stop_metric: recall_at_5
  # Datasets to include in training.  Options: msls, gsv_cities (or both).
  train_datasets: [gsv_cities]
  # GSV-Cities held-out val cities.  Leave empty to auto-select by gsv_val_fraction.
  gsv_val_cities: []
  # Fraction of GSV cities to hold out when gsv_val_cities is empty.
  gsv_val_fraction: 0.1
  # Log GSV val Recall@K each epoch when gsv_cities is in train_datasets.
  gsv_val_enabled: true

# ─── Augmentation (toggled via --augment) ─────────────────────────────
augmentation:
  random_resized_crop:
    size: 224
    scale: [0.7, 1.0]
  color_jitter:
    brightness: 0.4
    contrast: 0.4
    saturation: 0.4
    hue: 0.1
  random_grayscale_p: 0.1
  gaussian_blur:
    enabled: false
    kernel_size: 23
    sigma: [0.1, 2.0]
  random_horizontal_flip:
    enabled: false
    p: 0.5

# ─── Evaluation ──────────────────────────────────────────────────────
evaluation:
  recall_ks: [1, 5, 10, 20]
  image_size: 224
